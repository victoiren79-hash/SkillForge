<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillForge</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050508;
            --surface: #0f1018;
            --surface-light: #161926;
            --border: #2a2d40;
            --text: #ffffff;
            --text-dim: #6b6f85;
            --accent: #00f3ff;
            --accent-glow: rgba(0, 243, 255, 0.3);
            --success: #00ff88;
            --success-glow: rgba(0, 255, 136, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; }
        #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .view { display: none; flex-direction: column; min-height: 100vh; position: relative; z-index: 1; }
        .view.active { display: flex; animation: fadeIn 0.5s ease; }

        #input-view { justify-content: center; align-items: center; text-align: center; padding: 2rem; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; font-weight: 900; background: linear-gradient(135deg, var(--accent), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; }
        .tagline { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 3rem; }
        .input-box { width: 100%; max-width: 500px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin: 0 auto 1.5rem; transition: all 0.3s; display: flex; justify-content: center; align-items: center; }
        .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 30px var(--accent-glow); }
        textarea { width: 100%; background: transparent; border: none; color: var(--text); font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700; text-align: center; outline: none; resize: none; height: 40px; overflow: hidden; line-height: 40px; }
        textarea::placeholder { color: var(--text-dim); font-weight: 400; font-family: 'Inter'; }
        .btn-go { background: var(--accent); color: #000; font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 1rem; padding: 1rem 2rem; border: none; border-radius: 12px; cursor: pointer; width: 100%; max-width: 500px; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-go:hover { transform: translateY(-3px); box-shadow: 0 10px 25px var(--accent-glow); }

        #loading-view { justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 1rem; }
        .loading-text { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--accent); }

        .top-bar { padding: 0 2rem; height: 56px; background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; display: flex; align-items: center; gap: 1.5rem; }
        .top-logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1rem; background: linear-gradient(135deg, var(--accent), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; flex-shrink: 0; letter-spacing: 1px; }
        .top-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }
        .hobby-tabs { display: flex; gap: 0.4rem; overflow-x: auto; flex: 1; min-width: 0; align-items: center; }
        .hobby-tabs::-webkit-scrollbar { display: none; }
        .hobby-tab { background: transparent; border: 1px solid transparent; padding: 0.3rem 0.75rem; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 0.4rem; color: var(--text-dim); }
        .hobby-tab.active { border-color: var(--accent); background: rgba(0, 243, 255, 0.08); color: var(--accent); }
        .hobby-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.04); }
        .tab-close { font-size: 0.65rem; opacity: 0.4; cursor: pointer; }
        .tab-close:hover { opacity: 1; color: #ff4757; }
        .top-controls { display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
        .hud-text { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: var(--accent); font-weight: 700; letter-spacing: 1px; }
        .btn-new-path { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 0.3rem 0.75rem; border-radius: 6px; cursor: pointer; font-weight: 700; font-family: 'Inter'; font-size: 0.75rem; transition: 0.2s; white-space: nowrap; }
        .btn-new-path:hover { background: rgba(0, 243, 255, 0.1); }

        /* scroll-area scrolls internally; path-container is positioned relative inside it */
        .scroll-area { flex: 1; overflow-y: auto; padding: 4rem 2rem; padding-bottom: 50px; }
        .scroll-area::-webkit-scrollbar { width: 6px; }
        .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* path-container: position relative so the dot and line are anchored to it */
        .path-container { max-width: 900px; margin: 0 auto; position: relative; }

        /* The vertical line spans the full height of path-container */
        .travel-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: var(--border); transform: translateX(-50%); z-index: 1; border-radius: 2px; }

        /* 
          THE FIX: The dot is absolute inside path-container.
          We set its top via JS using card.offsetTop (relative to path-container)
          + header.offsetTop (relative to card) + header.offsetHeight/2.
          This is pure layout math — no getBoundingClientRect, no scroll dependency.
          CSS transition handles smooth movement between phases.
        */
        .travel-dot {
            position: absolute;
            left: 50%;
            width: 20px;
            height: 20px;
            background: var(--accent);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 6;
            box-shadow: 0 0 25px var(--accent-glow), inset 0 0 5px white;
            display: none;
            top: 0;
        }
        /* Animated version gets the transition class added by JS */
        .travel-dot.animated {
            transition: top 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Phase cards — nth-child counts from ALL children including travel-line and travel-dot.
           Those are the 1st and 2nd children, so phase cards start at nth-child(3).
           We use a wrapper div instead to avoid this issue. */
        .phases-wrapper { position: relative; }

        .phase-card { width: 45%; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 4rem; position: relative; z-index: 5; transition: opacity 0.5s, border-color 0.5s, box-shadow 0.5s; opacity: 0.3; pointer-events: none; }
        .phase-card.enabled { opacity: 1; pointer-events: auto; border-color: rgba(0, 243, 255, 0.3); box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .phase-card.complete { border-color: var(--success); box-shadow: 0 0 25px var(--success-glow); opacity: 0.7; }

        .phase-card:nth-child(odd)  { margin-left: 0; margin-right: auto; }
        .phase-card:nth-child(even) { margin-left: auto; margin-right: 0; }

        .phase-card::after { content: ''; position: absolute; top: var(--dash-y, 50%); width: 20px; height: 4px; background: var(--border); transition: background 0.3s; transform: translateY(-50%); }
        .phase-card:nth-child(odd)::after  { right: -20px; }
        .phase-card:nth-child(even)::after { left: -20px; }
        .phase-card.enabled::after  { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
        .phase-card.complete::after { background: var(--success); box-shadow: 0 0 10px var(--success-glow); }

        .phase-header { padding: 1.25rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .phase-card:nth-child(even) .phase-header { flex-direction: row-reverse; }
        .phase-info h2 { font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 0.25rem; }
        .phase-meta { font-size: 0.75rem; color: var(--text-dim); }
        .phase-time { color: var(--accent); font-weight: 700; }
        .lock-icon { font-size: 1.2rem; transition: 0.3s; }
        .phase-card.enabled .lock-icon, .phase-card.complete .lock-icon { display: none; }

        .task-list { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; padding: 0 1.25rem; }
        .phase-card.expanded .task-list { max-height: 2000px; padding: 0 1.25rem 1.25rem 1.25rem; }

        .task-item { background: var(--surface-light); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 0.5rem; transition: 0.2s; cursor: pointer; }
        .task-item.done { opacity: 0.5; border-color: rgba(0, 255, 136, 0.2); }
        .task-top { margin-bottom: 0.5rem; }
        .task-title { font-weight: 700; font-size: 0.95rem; color: #fff; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .task-tag { font-size: 0.55rem; padding: 0.15rem 0.35rem; background: rgba(0, 243, 255, 0.1); color: var(--accent); border-radius: 3px; text-transform: uppercase; font-weight: 800; border: 1px solid rgba(0, 243, 255, 0.2); }
        .task-tag.practice { background: rgba(0, 255, 136, 0.1); color: var(--success); border-color: rgba(0, 255, 136, 0.2); }
        .task-details { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .task-item.extended .task-details { max-height: 300px; }
        .task-desc { font-size: 0.85rem; color: var(--text-dim); line-height: 1.5; margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); margin-bottom: 1rem; }
        .task-actions { display: flex; flex-direction: column; gap: 1rem; margin-top: 0.5rem; }
        .action-links { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .act-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-dim); padding: 0.4rem 0.7rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 0.4rem; transition: 0.2s; }
        .act-btn:hover { background: rgba(0, 243, 255, 0.1); color: var(--accent); border-color: var(--accent); }
        .act-btn.practice-btn { border-color: rgba(0, 255, 136, 0.4); color: var(--success); background: rgba(0, 255, 136, 0.05); }
        .act-btn.practice-btn:hover { background: rgba(0, 255, 136, 0.15); }
        .complete-row { display: flex; justify-content: flex-end; }
        .btn-complete { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 0.5rem 1rem; border-radius: 6px; font-weight: 700; cursor: pointer; font-family: 'Inter'; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; transition: 0.3s; }
        .btn-complete:hover { border-color: var(--success); color: var(--success); box-shadow: 0 0 8px var(--success-glow); }
        .task-item.done .btn-complete { background: var(--success); color: #000; border-color: var(--success); pointer-events: none; }

        #confetti-canvas, #flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        #flash-overlay { background: white; opacity: 0; z-index: 99; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake-effect { animation: shake 0.3s ease-in-out; }

        @media (max-width: 768px) {
            .phase-card, .phase-card:nth-child(even) { width: 100%; margin: 0 auto 3rem auto; text-align: left; }
            .phase-card:nth-child(even) .phase-header { flex-direction: row; }
            .travel-line, .travel-dot { display: none !important; }
            .phase-card::after { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>
    <canvas id="confetti-canvas"></canvas>
    <div id="flash-overlay"></div>

    <div id="input-view" class="view active">
        <div style="width:100%; max-width:500px; text-align:center;">
            <div class="logo">SKILLFORGE</div>
            <div class="tagline">Level up your hobbies.</div>
            <div class="input-box">
                <textarea id="hobby-input" placeholder="What do you want to learn?" rows="1"></textarea>
            </div>
            <button class="btn-go" onclick="startGeneration()">Generate Path</button>
        </div>
    </div>

    <div id="loading-view" class="view">
        <div class="spinner"></div>
        <div class="loading-text">MAPPING JOURNEY...</div>
    </div>

    <div id="path-view" class="view">
        <div class="top-bar">
            <div class="top-logo">SKILLFORGE</div>
            <div class="top-divider"></div>
            <div class="hobby-tabs" id="hobby-tabs"></div>
            <div class="top-controls">
                <span class="hud-text" id="hud-percent">0%</span>
                <button class="btn-new-path" onclick="goToInput()">+ New Path</button>
            </div>
        </div>

        <div class="scroll-area" id="scroll-area">
            <div class="path-container" id="path-container">
                <div class="travel-line"></div>
                <div class="travel-dot" id="travel-dot"></div>
                <!-- Phase cards go inside phases-wrapper so nth-child works correctly -->
                <div class="phases-wrapper" id="phases-wrapper"></div>
            </div>
        </div>
    </div>

    <script>
        // API Key is now securely handled by the server proxy! No need to put it here.
        const MODEL = "meta-llama/llama-4-scout-17b-16e-instruct";

        // ── PERSISTENCE ────────────────────────────────────────────────────────────
        function saveToStorage() {
            // Only save the data that matters — not the DOM phase refs
            const toSave = hobbies.map(h => ({ id: h.id, name: h.name, data: h.data, totalTasks: h.totalTasks, completedTasks: h.completedTasks }));
            localStorage.setItem('skillforge_hobbies', JSON.stringify(toSave));
            localStorage.setItem('skillforge_active', activeHobbyId);
        }

        function loadFromStorage() {
            try {
                const saved = localStorage.getItem('skillforge_hobbies');
                const savedActive = localStorage.getItem('skillforge_active');
                if (saved) {
                    hobbies = JSON.parse(saved).map(h => ({ ...h, phases: [] }));
                    activeHobbyId = parseInt(savedActive) || hobbies[0]?.id || null;
                }
            } catch(e) { hobbies = []; }
        }

        let hobbies = [];
        let activeHobbyId = null;
        loadFromStorage();

        const pathContainer  = document.getElementById('path-container');
        const phasesWrapper  = document.getElementById('phases-wrapper');
        const hobbyTabs      = document.getElementById('hobby-tabs');
        const travelDot      = document.getElementById('travel-dot');
        const scrollArea     = document.getElementById('scroll-area');

        document.getElementById('hobby-input').addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); startGeneration(); }
        });

        // ── PARTICLES ──────────────────────────────────────────────────────────────
        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');
        pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight;
        window.addEventListener('resize', () => { pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight; });
        class Particle { constructor() { this.reset(); } reset() { this.x = Math.random() * pCanvas.width; this.y = Math.random() * pCanvas.height; this.size = Math.random() * 1.5 + 0.5; this.speedX = Math.random() * 0.4 - 0.2; this.speedY = Math.random() * 0.4 - 0.2; this.opacity = Math.random() * 0.3 + 0.1; } update() { this.x += this.speedX; this.y += this.speedY; if (this.x > pCanvas.width || this.x < 0 || this.y > pCanvas.height || this.y < 0) this.reset(); } draw() { pCtx.beginPath(); pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); pCtx.fillStyle = `rgba(0,243,255,${this.opacity})`; pCtx.fill(); } }
        const particles = Array.from({length:60}, () => new Particle());
        (function animP() { pCtx.clearRect(0,0,pCanvas.width,pCanvas.height); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animP); })();

        // ── VIEWS ──────────────────────────────────────────────────────────────────
        function showView(v) { document.querySelectorAll('.view').forEach(el=>el.classList.remove('active')); document.getElementById(v+'-view').classList.add('active'); }
        function goToInput() { showView('input'); }

        // ── DOT POSITIONING ────────────────────────────────────────────────────────
        /*
          KEY INSIGHT: The dot lives inside .path-container (position:relative).
          .phases-wrapper is a direct child of .path-container.
          
          To get the dot's correct `top` value we need:
            card.offsetTop          — card top relative to phases-wrapper
            + phasesWrapper.offsetTop — phases-wrapper top relative to path-container
            + header.offsetTop      — header top relative to card
            + header.offsetHeight/2 — vertical midpoint of the header

          This is 100% layout-based and scroll-independent.
        */
        function getHeaderMidY(cardEl) {
            // Use the header's midpoint — set --dash-y on the card so ::after matches exactly
            const header = cardEl.querySelector('.phase-header');
            const headerMidInCard = header.offsetTop + header.offsetHeight / 2;
            cardEl.style.setProperty('--dash-y', headerMidInCard + 'px');
            return phasesWrapper.offsetTop + cardEl.offsetTop + headerMidInCard;
        }

        function moveDotTo(cardEl, instant) {
            const y = getHeaderMidY(cardEl);
            travelDot.style.display = 'block';

            if (instant) {
                travelDot.classList.remove('animated');
                travelDot.style.top = y + 'px';
                // re-enable animation next frame
                requestAnimationFrame(() => travelDot.classList.add('animated'));
            } else {
                travelDot.classList.add('animated');
                travelDot.style.top = y + 'px';
            }
        }

        function snapDotToActivePhase() {
            const hobby = getActiveHobby();
            if (!hobby) return;
            const active = hobby.phases.find(p => p.element.classList.contains('enabled'));
            if (active) moveDotTo(active.element, true);
        }

        // ── API ────────────────────────────────────────────────────────────────────
        async function startGeneration() {
            const hobbyName = document.getElementById('hobby-input').value.trim();
            if (!hobbyName) return;
            showView('loading');
            const generationStart = Date.now();
            const data = await fetchGroq(hobbyName);
            if (!data) {
                if (typeof pendo !== 'undefined') {
                    pendo.track("roadmap_generation_failed", {
                        hobbyName: hobbyName,
                        errorType: "api_or_parse_failure",
                        generationDurationMs: Date.now() - generationStart
                    });
                }
                alert("Failed. Check API Key."); showView('input'); return;
            }

            const newHobby = { id: Date.now(), name: hobbyName, data, totalTasks: 0, completedTasks: 0, phases: [] };
            data.forEach(p => { newHobby.totalTasks += p.tasks ? p.tasks.length : 0; });
            hobbies.push(newHobby);
            activeHobbyId = newHobby.id;
            saveToStorage();

            if (typeof pendo !== 'undefined') {
                pendo.track("roadmap_generated", {
                    hobbyName: hobbyName,
                    phaseCount: data.length,
                    totalTasks: newHobby.totalTasks,
                    modelUsed: MODEL,
                    generationDurationMs: Date.now() - generationStart
                });
            }

            document.getElementById('hobby-input').value = '';
            renderTabs();
            renderActivePath();
            showView('path');
        }

        async function fetchGroq(hobby) {
            const prompt = `You are an expert practical skill educator. A user wants to learn: "${hobby}". Create a detailed, realistic, HANDS-ON roadmap based on PROVEN STRATEGIES and first principles. Output STRICTLY valid JSON. No markdown. Format: [{"level": "Phase 1", "weeks": "Week 1-3", "tasks": [{"title": "Task Title", "desc": "Detailed 2-sentence explanation of the strategy and why it works.", "tag": "Practice", "search": "specific search string for this task ${hobby}", "practice_link": "URL to a practice site if applicable (e.g. LeetCode, Codecademy, Exercism) or null"}]}]. CRITICAL RULES: 1. Timeframes: You MUST use the "weeks" key to represent a sequential roadmap. Start with "Week 1-2" or "Week 1-3". The next phase MUST start exactly after the previous one ended. Example: If Phase 1 is "Week 1-3", Phase 2 MUST be "Week 4-7". NEVER use the word "ongoing". Complex skills like coding should span 20+ weeks total. 2. Provide EXACTLY 5 to 7 phases. 3. Task tags must be EXACTLY "Theory", "Video", or "Practice". Include lots of Practice tags. 4. Make descriptions DETAILED and strategic. 5. Provide practice_link URLs where possible. 6. Be highly specific in search strings.`;
            try {
                // Calls your local server proxy instead of Groq directly
                const r = await fetch("/api/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ model: MODEL, messages: [{ role: "user", content: prompt }], response_format: { type: "json_object" } })
                });
                if (!r.ok) return null;
                const result = await r.json();
                if (!result.choices?.[0]) return null;
                const parsed = JSON.parse(result.choices[0].message.content);
                if (Array.isArray(parsed)) return parsed;
                for (const k of Object.keys(parsed)) if (Array.isArray(parsed[k])) return parsed[k];
                return null;
            } catch(e) { console.error(e); return null; }
        }

        // ── RENDER ─────────────────────────────────────────────────────────────────
        function renderTabs() {
            hobbyTabs.innerHTML = '';
            hobbies.forEach(hobby => {
                const tab = document.createElement('div');
                tab.className = `hobby-tab ${hobby.id === activeHobbyId ? 'active' : ''}`;
                tab.innerHTML = `${hobby.name} <span class="tab-close" onclick="event.stopPropagation();closeHobby(${hobby.id})">✕</span>`;
                tab.onclick = () => { activeHobbyId = hobby.id; saveToStorage(); renderTabs(); renderActivePath(); };
                hobbyTabs.appendChild(tab);
            });
        }

        function closeHobby(id) {
            const deletedHobby = hobbies.find(h => h.id === id);
            if (deletedHobby && typeof pendo !== 'undefined') {
                pendo.track("learning_path_deleted", {
                    hobbyName: deletedHobby.name,
                    completedTasks: deletedHobby.completedTasks,
                    totalTasks: deletedHobby.totalTasks,
                    completionPercent: deletedHobby.totalTasks > 0 ? Math.round(deletedHobby.completedTasks / deletedHobby.totalTasks * 100) : 0,
                    phaseCount: deletedHobby.data ? deletedHobby.data.length : 0,
                    remainingPathCount: hobbies.length - 1
                });
            }
            hobbies = hobbies.filter(h => h.id !== id);
            if (!hobbies.length) { localStorage.removeItem('skillforge_hobbies'); localStorage.removeItem('skillforge_active'); showView('input'); return; }
            if (activeHobbyId === id) activeHobbyId = hobbies[0].id;
            saveToStorage();
            renderTabs(); renderActivePath();
        }

        function getActiveHobby() { return hobbies.find(h => h.id === activeHobbyId); }

        function renderActivePath() {
            const hobby = getActiveHobby();
            if (!hobby) return;

            phasesWrapper.innerHTML = '';
            hobby.phases = [];

            hobby.data.forEach((phase, index) => {
                const card = document.createElement('div');
                card.className = 'phase-card locked';
                card.style.marginTop = index === 0 ? '0' : '2rem';

                const taskCount = phase.tasks ? phase.tasks.length : 0;
                const timeDisplay = phase.weeks || phase.time || "Flexible";

                let tasksHtml = '';
                (phase.tasks || []).forEach(task => {
                    const ytLink = `https://www.youtube.com/results?search_query=${encodeURIComponent(task.search || task.title)}`;
                    const gLink  = `https://www.google.com/search?q=${encodeURIComponent((task.search || task.title) + ' ' + hobby.name)}`;
                    const pLink  = task.practice_link && task.practice_link !== 'null' ? task.practice_link : null;
                    const tagClass = task.tag === 'Practice' ? 'practice' : '';
                    const isDone = task._done ? 'done' : '';
                    let actionBtns = `<a href="${ytLink}" target="_blank" class="act-btn" onclick="trackResourceClick('${hobby.name.replace(/'/g, "\\'")}', '${(phase.level || '').replace(/'/g, "\\'")}', ${index}, '${task.title.replace(/'/g, "\\'")}', '${task.tag}', 'YouTube', this.href)">▶ YouTube</a><a href="${gLink}" target="_blank" class="act-btn" onclick="trackResourceClick('${hobby.name.replace(/'/g, "\\'")}', '${(phase.level || '').replace(/'/g, "\\'")}', ${index}, '${task.title.replace(/'/g, "\\'")}', '${task.tag}', 'Search', this.href)">🔍 Search</a>`;
                    if (pLink) actionBtns += `<a href="${pLink}" target="_blank" class="act-btn practice-btn" onclick="trackResourceClick('${hobby.name.replace(/'/g, "\\'")}', '${(phase.level || '').replace(/'/g, "\\'")}', ${index}, '${task.title.replace(/'/g, "\\'")}', '${task.tag}', 'Practice', this.href)">⚡ Practice</a>`;
                    tasksHtml += `
                        <div class="task-item ${isDone}" onclick="toggleTaskDetails(this,event)">
                            <div class="task-top"><div class="task-title">${task.title} <span class="task-tag ${tagClass}">${task.tag}</span></div></div>
                            <div class="task-details">
                                <div class="task-desc">${task.desc}</div>
                                <div class="task-actions" onclick="event.stopPropagation()">
                                    <div class="action-links">${actionBtns}</div>
                                    <div class="complete-row"><button class="btn-complete" onclick="completeTask(this,${index})">Complete</button></div>
                                </div>
                            </div>
                        </div>`;
                });

                card.innerHTML = `
                    <div class="phase-header" onclick="toggleExpand(this)">
                        <div class="phase-info">
                            <h2>${phase.level}</h2>
                            <div class="phase-meta">⏱ <span class="phase-time">${timeDisplay}</span> • ${taskCount} Nodes</div>
                        </div>
                        <div class="lock-icon">🔒</div>
                    </div>
                    <div class="task-list">${tasksHtml}</div>
                `;

                phasesWrapper.appendChild(card);
                hobby.phases.push({ element: card, totalTasks: taskCount, completedTasks: 0 });
            });

            // Restore states
            hobby.data.forEach((phase, i) => {
                const done = phase.tasks.filter(t => t._done).length;
                hobby.phases[i].completedTasks = done;
                if (done === hobby.phases[i].totalTasks && done > 0) {
                    hobby.phases[i].element.classList.replace('locked', 'complete');
                } else if (i === 0 || hobby.phases[i-1].element.classList.contains('complete')) {
                    hobby.phases[i].element.classList.replace('locked', 'enabled');
                    if (!hobby.phases.some(p => p.element.classList.contains('expanded')))
                        hobby.phases[i].element.classList.add('expanded');
                }
            });

            // Wait two frames: one for DOM insertion, one for layout computation
            requestAnimationFrame(() => requestAnimationFrame(() => snapDotToActivePhase()));
            updateHUD();
        }

        function toggleExpand(header) {
            const card = header.closest('.phase-card');
            if (!card.classList.contains('enabled')) return;
            const hobby = getActiveHobby();
            hobby.phases.forEach(p => { if (p.element !== card) p.element.classList.remove('expanded'); });
            card.classList.toggle('expanded');
            // After the expand/collapse CSS transition (400ms), reposition dot and dash
            setTimeout(snapDotToActivePhase, 420);
        }

        function toggleTaskDetails(item, event) {
            if (event.target.closest('.task-actions')) return;
            item.classList.toggle('extended');
        }

        function trackResourceClick(hobbyName, phaseName, phaseIndex, taskTitle, taskTag, resourceType, resourceUrl) {
            if (typeof pendo !== 'undefined') {
                pendo.track("resource_link_clicked", {
                    hobbyName: hobbyName,
                    phaseName: phaseName,
                    phaseIndex: phaseIndex,
                    taskTitle: taskTitle,
                    taskTag: taskTag,
                    resourceType: resourceType,
                    resourceUrl: resourceUrl
                });
            }
        }

        function completeTask(btn, phaseIndex) {
            const taskItem = btn.closest('.task-item');
            if (taskItem.classList.contains('done')) return;

            taskItem.classList.add('done');
            const hobby = getActiveHobby();

            const title = taskItem.querySelector('.task-title').childNodes[0].textContent.trim();
            const taskData = hobby.data[phaseIndex].tasks.find(t => t.title === title);
            if (taskData) taskData._done = true;

            hobby.completedTasks++;
            hobby.phases[phaseIndex].completedTasks++;
            saveToStorage();

            if (typeof pendo !== 'undefined') {
                const tagEl = taskItem.querySelector('.task-tag');
                pendo.track("task_completed", {
                    hobbyName: hobby.name,
                    phaseIndex: phaseIndex,
                    phaseName: hobby.data[phaseIndex].level || '',
                    taskTitle: title,
                    taskTag: tagEl ? tagEl.textContent.trim() : '',
                    phaseTasksCompleted: hobby.phases[phaseIndex].completedTasks,
                    phaseTotalTasks: hobby.phases[phaseIndex].totalTasks,
                    overallCompletedTasks: hobby.completedTasks,
                    overallTotalTasks: hobby.totalTasks,
                    overallProgressPct: Math.round(hobby.completedTasks / hobby.totalTasks * 100)
                });
            }

            if (hobby.phases[phaseIndex].completedTasks === hobby.phases[phaseIndex].totalTasks) {
                if (typeof pendo !== 'undefined') {
                    pendo.track("phase_completed", {
                        hobbyName: hobby.name,
                        phaseName: hobby.data[phaseIndex].level || '',
                        phaseIndex: phaseIndex,
                        phaseTaskCount: hobby.phases[phaseIndex].totalTasks,
                        totalPhases: hobby.phases.length,
                        isLastPhase: phaseIndex === hobby.phases.length - 1,
                        nextPhaseName: phaseIndex + 1 < hobby.data.length ? (hobby.data[phaseIndex + 1].level || '') : '',
                        overallProgressPct: Math.round(hobby.completedTasks / hobby.totalTasks * 100)
                    });
                }

                hobby.phases[phaseIndex].element.classList.remove('enabled', 'expanded');
                hobby.phases[phaseIndex].element.classList.add('complete');

                if (phaseIndex + 1 < hobby.phases.length) {
                    document.body.classList.add('shake-effect');
                    setTimeout(() => document.body.classList.remove('shake-effect'), 300);

                    setTimeout(() => {
                        const next = hobby.phases[phaseIndex + 1];
                        next.element.classList.remove('locked');
                        next.element.classList.add('enabled', 'expanded');

                        // Give the DOM one paint cycle to render the newly visible card,
                        // then move dot (animated) and scroll
                        requestAnimationFrame(() => requestAnimationFrame(() => {
                            moveDotTo(next.element, false); // smooth animated move
                            setTimeout(() => {
                                next.element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            }, 200); // slight delay so scroll and dot move feel coordinated
                        }));
                    }, 500);
                }
            }

            updateHUD();
            if (hobby.completedTasks === hobby.totalTasks) {
                if (typeof pendo !== 'undefined') {
                    pendo.track("learning_path_completed", {
                        hobbyName: hobby.name,
                        totalTasks: hobby.totalTasks,
                        phaseCount: hobby.data.length,
                        totalPaths: hobbies.length,
                        isFirstCompletion: hobbies.filter(h => h.completedTasks === h.totalTasks).length === 1
                    });
                }
                setTimeout(fireConfetti, 500);
            }
        }

        function updateHUD() {
            const h = getActiveHobby();
            if (!h) return;
            const pct = h.totalTasks === 0 ? 0 : Math.round(h.completedTasks / h.totalTasks * 100);
            document.getElementById('hud-percent').textContent = pct + '%';
        }

        // ── CONFETTI ───────────────────────────────────────────────────────────────
        const cCanvas = document.getElementById('confetti-canvas');
        const cCtx = cCanvas.getContext('2d');
        cCanvas.width = window.innerWidth; cCanvas.height = window.innerHeight;
        let cParts = [], cAF;
        function fireConfetti() {
            cParts = Array.from({length:150}, () => ({
                x: cCanvas.width/2, y: cCanvas.height,
                size: Math.random()*6+2,
                speedX: Math.random()*16-8, speedY: Math.random()*14-10,
                color: ['#00f3ff','#00ff88','#ffffff'][Math.floor(Math.random()*3)]
            }));
            animConfetti();
            setTimeout(() => { cancelAnimationFrame(cAF); cCtx.clearRect(0,0,cCanvas.width,cCanvas.height); }, 3000);
        }
        function animConfetti() {
            cCtx.clearRect(0,0,cCanvas.width,cCanvas.height);
            cParts.forEach(p => { p.x+=p.speedX; p.y+=p.speedY; p.speedY+=0.15; cCtx.fillStyle=p.color; cCtx.fillRect(p.x,p.y,p.size,p.size); });
            cAF = requestAnimationFrame(animConfetti);
        }

        // ── RESTORE SESSION ON LOAD ────────────────────────────────────────────────
        if (hobbies.length > 0) {
            renderTabs();
            renderActivePath();
            showView('path');

            if (typeof pendo !== 'undefined') {
                const totalCompleted = hobbies.reduce((sum, h) => sum + h.completedTasks, 0);
                const totalAll = hobbies.reduce((sum, h) => sum + h.totalTasks, 0);
                const activeH = getActiveHobby();
                pendo.track("session_restored", {
                    pathCount: hobbies.length,
                    totalCompletedTasks: totalCompleted,
                    totalTasks: totalAll,
                    overallProgressPct: totalAll > 0 ? Math.round(totalCompleted / totalAll * 100) : 0,
                    activeHobbyName: activeH ? activeH.name : ''
                });
            }
        }
    </script>
</body>
</html>
